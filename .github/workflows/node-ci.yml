name: Node.js CI
on:
  push:
    branches: [master, main, 'bricklayer-v2/**']
  pull_request:
    branches: [master, main]

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      js: ${{ steps.filter.outputs.js }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            js:
              - '**/*.js'
              - '**/*.ts'
              - '**/*.tsx'
              - '**/package.json'
              - '**/package-lock.json'

  test:
    needs: changes
    if: needs.changes.outputs.js == 'true'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20.x, 22.x]
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
          cache-dependency-path: masonry/package-lock.json
      - run: npm ci
        working-directory: masonry
      - run: npx vitest run --exclude='**/hooks/**' --exclude='src/tools/**'
        working-directory: masonry
      - name: Run src/tools assert tests
        run: for f in src/tools/*.test.js; do node "$f" || exit 1; done
        working-directory: masonry
      - run: npm run build --if-present
        working-directory: masonry

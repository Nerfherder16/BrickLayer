<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BrickLayer Brainstorm Canvas</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0d1117;
      color: #e6edf3;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 14px;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Header ── */
    #header {
      background: #161b22;
      border-bottom: 1px solid #30363d;
      padding: 10px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }

    #header h1 {
      font-size: 15px;
      font-weight: 600;
      color: #58a6ff;
      letter-spacing: 0.02em;
    }

    #section-count {
      font-size: 12px;
      color: #8b949e;
    }

    /* ── Tab nav ── */
    #tab-nav {
      display: flex;
      gap: 0;
      border-bottom: 1px solid #21262d;
      padding: 0 12px;
    }
    .tab-btn {
      background: none;
      border: none;
      color: #8b949e;
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      padding: 7px 10px 6px;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      transition: color 0.1s;
    }
    .tab-btn:hover { color: #e6edf3; }
    .tab-btn.active { color: #58a6ff; border-bottom-color: #58a6ff; }

    /* ── Chronicle ── */
    #chronicle-panel { display: none; padding: 16px; overflow-y: auto; flex: 1; }
    #chronicle-panel.visible { display: block; }
    .chr-table { width: 100%; border-collapse: collapse; font-size: 13px; }
    .chr-table th { text-align: left; color: #8b949e; font-weight: 600; padding: 6px 8px; border-bottom: 1px solid #30363d; }
    .chr-table td { padding: 6px 8px; border-bottom: 1px solid #21262d; color: #c9d1d9; vertical-align: top; }
    .chr-table tr:hover td { background: #161b22; cursor: pointer; }
    .chr-verdict-clean { color: #3fb950; font-weight: 600; }
    .chr-verdict-drift { color: #f85149; font-weight: 600; }
    .chr-status-badge { display: inline-block; padding: 1px 6px; border-radius: 10px; font-size: 11px; background: #21262d; }
    .chr-detail { margin-top: 16px; padding: 12px; background: #161b22; border: 1px solid #30363d; border-radius: 6px; }
    .chr-detail h3 { color: #58a6ff; margin-bottom: 10px; font-size: 14px; }
    .chr-section-row { padding: 4px 0; border-bottom: 1px solid #21262d; font-size: 12px; color: #8b949e; }
    .chr-section-row span { color: #e6edf3; }

    /* ── Main layout ── */
    #layout {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* ── Left sidebar ── */
    #sidebar {
      width: 200px;
      flex-shrink: 0;
      border-right: 1px solid #30363d;
      overflow-y: auto;
      background: #0d1117;
    }

    #sidebar-title {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #8b949e;
      padding: 10px 12px 6px;
      border-bottom: 1px solid #21262d;
    }

    #section-list {
      padding: 4px 0;
    }

    .section-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 7px 12px;
      cursor: pointer;
      border-radius: 4px;
      margin: 1px 4px;
      transition: background 0.1s;
    }

    .section-item:hover {
      background: #161b22;
    }

    .section-item.active {
      background: #1f2937;
      border-left: 2px solid #58a6ff;
      padding-left: 10px;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
      background: #8b949e;
    }

    .section-label {
      font-size: 13px;
      color: #e6edf3;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* ── Main canvas ── */
    #canvas {
      flex: 1;
      padding: 20px 24px;
      overflow-y: auto;
      background: #0d1117;
    }

    #empty-state {
      color: #8b949e;
      font-style: italic;
      margin-top: 40px;
      text-align: center;
    }

    #canvas-title {
      font-size: 18px;
      font-weight: 600;
      color: #58a6ff;
      margin-bottom: 14px;
      border-bottom: 1px solid #21262d;
      padding-bottom: 10px;
    }

    #canvas-content {
      white-space: pre-wrap;
      line-height: 1.65;
      color: #c9d1d9;
      font-size: 14px;
      font-family: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace;
    }

    /* ── Right panel ── */
    #actions {
      width: 140px;
      flex-shrink: 0;
      border-left: 1px solid #30363d;
      padding: 16px 10px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      background: #0d1117;
    }

    #actions-title {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #8b949e;
      margin-bottom: 4px;
    }

    .action-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 8px 10px;
      border: 1px solid #30363d;
      border-radius: 6px;
      background: #161b22;
      color: #e6edf3;
      cursor: pointer;
      font-size: 13px;
      transition: background 0.15s, border-color 0.15s;
      width: 100%;
      text-align: left;
    }

    .action-btn:hover {
      background: #21262d;
      border-color: #58a6ff;
    }

    #btn-approve:hover { border-color: #3fb950; }
    #btn-flag:hover    { border-color: #f85149; }
    #btn-expand:hover  { border-color: #58a6ff; }

    /* Scrollbar styling */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #30363d; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #484f58; }
  </style>
</head>
<body>

  <div id="header">
    <h1>BrickLayer Brainstorm Canvas</h1>
    <span id="section-count">0 / 0 approved</span>
  </div>

  <div id="layout">

    <div id="sidebar">
      <div id="tab-nav">
        <button class="tab-btn active" id="tab-sections" onclick="switchTab('sections')">Sections</button>
        <button class="tab-btn" id="tab-chronicle" onclick="switchTab('chronicle')">Chronicle</button>
      </div>
      <div id="sidebar-title" style="display:none">Sections</div>
      <div id="section-list">
        <!-- populated by JS -->
      </div>
      <div id="chronicle-panel">
        <div id="chronicle-content"><em style="color:#8b949e">Loading...</em></div>
      </div>
    </div>

    <div id="canvas">
      <div id="empty-state">No section selected. Add sections via POST /section.</div>
      <div id="canvas-body" style="display:none">
        <div id="canvas-title"></div>
        <pre id="canvas-content"></pre>
      </div>
    </div>

    <div id="actions">
      <div id="actions-title">Actions</div>
      <button id="btn-approve" class="action-btn" title="Approve this section">
        <span>&#10003;</span> Approve
      </button>
      <button id="btn-flag" class="action-btn" title="Flag this section">
        <span>&#9873;</span> Flag
      </button>
      <button id="btn-expand" class="action-btn" title="Request expansion">
        <span>&#8599;</span> Expand
      </button>
    </div>

  </div>

  <script>
/* HELPER_JS_INLINE */
  </script>

</body>
</html>
